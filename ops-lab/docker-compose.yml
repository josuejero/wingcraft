version: '3.9'
services:
  paper:
    image: itzg/paper:latest
    container_name: wingcraft-paper
    ports:
      - '25565:25565'
    volumes:
      - './data:/data'
      - './logs:/data/logs'
      - './server.properties:/data/server.properties:ro'
    environment:
      EULA: 'TRUE'
    tty: true
    stdin_open: true
    restart: unless-stopped
